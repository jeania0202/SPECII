<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>ROCK PAPER SCISSORS</h1>
    <div class="game-container">
        <div class="choices">
            <button id="rock" class="choice-button">Rock</button>
            <button id="paper" class="choice-button">Paper</button>
            <button id="scissors" class="choice-button">Scissors</button>
        </div>
        <div class="result">
              <div class="choice-display" id="playerChoice"></div>
              <div class="choice-display" id="computerChoice"></div>
            <p id="result-text">Make your choice!</p>
        <div class="score-row">
            <div>
                <div class="score-item" id="playerscore">0</div>
                <div class="score-label">Your Score</div>
            </div>
            <div>
                <div class="score-item" id="computerscore">0</div>
                <div class="score-label">Computer Score</div>
            </div>
          

        </div>
        
    
</body>
</html>
