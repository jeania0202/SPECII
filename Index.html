<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ROCK-PAPER-SCISSORS</h1>
    <div class="game-container">
    <p id="text">Make your choice!</p>
        <div class="choices">
            <button id="rock" >👊</button>
            <button id="paper" >✋</button>
            <button id="scissor">✌️</button>
        </div>
                <div id="player-Choice">YOU:</div>
                <div id="computer-Choice">COMPUTER:</div>
        <div id="score-board">
                <div id="player-score">YOU: 0</div>
                <div id="computer-score">COMPUTER: 0</div>    

        </div>
                <div id="result-text">RESULT:</div>
                <div id="final-result"></div>
        </div>  
        
        <button id="reset">RESET GAME</button>

    <script src="script.js"></script>
</body>
</html>
